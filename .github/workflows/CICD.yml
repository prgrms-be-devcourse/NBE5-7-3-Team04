name: CI/CD

on:
    push:
        branches:
            - main
            - dev

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Get short SHA
              id: slug
              run: echo "sha7=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: "21"
                  distribution: "temurin"

            - name: Setup MySQL
              uses: mirromutth/mysql-action@v1.1
              with:
                  mysql database: "testDB"
                  mysql user: "test"
                  mysql password: "test"

            - name: Create application.yml for testing
              run: |
                  mkdir -p ./backend/src/main/resources
                  cat > ./backend/src/main/resources/application.yml << 'EOT'
                  spring:
                    oauth2:
                      url:
                        callback: http://localhost:3000/oauth2/callback
                        sign-up: http://localhost:3000/oauth2/sign-up
                    datasource:
                      url: jdbc:mysql://localhost:3306/testDB
                      username: test
                      password: test
                      driver-class-name: com.mysql.cj.jdbc.Driver
                    jpa:
                      hibernate:
                        ddl-auto: create
                      show-sql: true
                      properties:
                        hibernate:
                          format_sql: true
                    data:
                      redis:
                        schedule-seats: "performance:schedule:seats:"
                        refresh-token: "refreshToken:"
                        host: redis
                        port: 6379
                        
                    security:
                      oauth2:
                        client:
                          provider:
                            naver:
                              authorization-uri: https://nid.naver.com/oauth2.0/authorize
                              token-uri: https://nid.naver.com/oauth2.0/token
                              user-info-uri: https://openapi.naver.com/v1/nid/me
                              user-name-attribute: response
                            kakao:
                              authorization-uri: https://kauth.kakao.com/oauth/authorize
                              token-uri: https://kauth.kakao.com/oauth/token
                              user-info-uri: https://kapi.kakao.com/v2/user/me
                              user-name-attribute: id

                          registration:
                            google:
                              authorization-grant-type: authorization_code
                              client-authentication-method: client_secret_post
                              client-id: dummy-id-for-test
                              client-secret: dummy-secret-for-test
                              scope:
                                - email
                                - profile
                            naver:
                              client-name: Naver
                              client-id: dummy-id-for-test
                              client-secret: dummy-secret-for-test
                              redirect-uri: "http://localhost:8080/login/oauth2/code/naver"
                              authorization-grant-type: authorization_code
                              client-authentication-method: client_secret_post
                              scope:
                                - name
                                - nickname
                                - email
                            kakao:
                              client-name: Kakao
                              client-id: dummy-id-for-test
                              client-secret: dummy-secret-for-test
                              redirect-uri: "http://localhost:8080/login/oauth2/code/kakao"
                              authorization-grant-type: authorization_code
                              client-authentication-method: client_secret_post
                              scope:
                                - profile_nickname

                  jwt:
                    secret: dummy-secret-for-test
                    access-expiration: 3600000
                    refresh-expiration: 36000000

                  cloud:
                      aws:
                          credentials:
                              access-key: dummy-key-for-test
                              secret-key: dummy-secret-for-test
                          region: ap-northeast-2
                          s3:
                              bucket: dummy-bucket-for-test

                  reservation:
                      expired_time: 3

                  app:
                    admin:
                      id: dummy-id-for-test
                      password: dummy-password-for-test

                  coolsms:
                    api:
                      key: dummy-key-for-test
                      secret: dummy-secret-for-test
                      number: dummy-number-for-test

                  logging:
                    level:
                      web: debug
                      
                  commit:
                    hash: test
                    
                  EOT
                  sed -i "s|\${COMMIT_HASH}|${{ steps.slug.outputs.sha7 }}|g" ./backend/src/main/resources/application.yml
              shell: bash

            - name: Build with Gradle
              run: |
                  cd backend
                  chmod +x gradlew
                  ./gradlew build -x test

            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v4
              with:
                  context: ./backend
                  push: true
                  tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest

            - name: Create .env file and deploy
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.HOST }}
                  username: ec2-user
                  key: ${{ secrets.KEY }}
                  script: |
                      echo "Creating .env file with secure configuration..."
                      cat > .env << EOL

                      HOST=${{secrets.HOST}}

                      # Spring 데이터베이스 설정
                      DB_URL=${{ secrets.DB_URL }}
                      DB_USERNAME=${{ secrets.DB_USERNAME }}
                      DB_PASSWORD=${{ secrets.DB_PASSWORD }}

                      # AWS S3 설정
                      AWS_S3_ACCESS_KEY=${{ secrets.AWS_S3_ACCESS_KEY }}
                      AWS_S3_SECRET_KEY=${{ secrets.AWS_S3_SECRET_KEY }}
                      AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }}

                      # OAuth
                      GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
                      GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
                      NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
                      NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
                      NAVER_REDIRECTURI=${{ secrets.NAVER_REDIRECTURI }}
                      KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
                      KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
                      KAKAO_REDIRECTURI=${{ secrets.KAKAO_REDIRECTURI }}


                      OAUTH2_URL_CALLBACK=${{ secrets.OAUTH2_URL_CALLBACK }}
                      OAUTH2_URL_SIGNUP=${{ secrets.OAUTH2_URL_SIGNUP }}

                      # JWT
                      JWT_SECRET=${{ secrets.JWT_SECRET }}
                      JWT_ACCESS_EXPIRATION=${{ secrets.JWT_ACCESS_EXPIRATION }}
                      JWT_REFRESH_EXPIRATION=${{ secrets.JWT_REFRESH_EXPIRATION }}

                      # Admin account
                      APP_ADMIN_ID=${{ secrets.APP_ADMIN_ID }}
                      APP_ADMIN_PASSWORD=${{ secrets.APP_ADMIN_PASSWORD }}

                      # Reservation
                      RESERVATION_EXPIRED_TIME=${{ secrets.RESERVATION_EXPIRED_TIME }}

                      # Commit hash
                      COMMIT_HASH=${{ steps.slug.outputs.sha7 }}
                      EOL

                      # .env 파일 권한 제한
                      chmod 600 .env

                      # echo "Stopping and removing existing Docker containers..."
                      # sudo docker rm -f $(sudo docker ps -aq) || echo "No containers to remove"

                      # redis와 mysql docker-compose 분리로 백엔드만 내려서 배포 수행
                      echo "Stopping and removing backend Docker container..."
                      sudo docker rm -f killing04_backend || echo "No backend containers to remove"

                      echo "Pulling the latest Docker image..."
                      sudo docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}

                      echo "Starting deployment with Docker Compose..."
                      sudo docker-compose up -d --build

                      echo "Cleaning up unused Docker images..."
                      sudo docker image prune -f || echo "No images to prune"
